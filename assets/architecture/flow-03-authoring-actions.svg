<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
	<title id="title">Iteration 3: authoring actions</title>
	<desc id="desc">A flowchart showing how user clicks and typing flow through main.js, insertion definitions, editor actions, pageState, renderShell, and toast feedback.</desc>
	<defs>
		<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
			<path d="M2,2 L10,6 L2,10 Z" fill="#496172" />
		</marker>
		<style>
			text{font-family:Lato,Segoe UI,Arial,sans-serif;fill:#202122}
			.title{font-size:34px;font-weight:800}
			.caption{font-size:19px;fill:#5c6470}
			.box-title{font-size:21px;font-weight:800}
			.box-copy{font-size:16px;fill:#5c6470}
			.arrow{stroke:#496172;stroke-width:4;fill:none;marker-end:url(#arrow)}
		</style>
	</defs>
	<rect width="1200" height="720" fill="#f6f8fb" />
	<text x="70" y="78" class="title">Iteration 3: add authoring behavior</text>
	<text x="70" y="114" class="caption">User actions are routed by one controller, then the JSON blueprint is changed and redrawn.</text>
	<g transform="translate(70 190)">
		<rect x="0" y="0" width="240" height="345" rx="18" fill="#ffffff" stroke="#cfd8e3" stroke-width="2" />
		<text x="26" y="50" class="box-title">User actions</text>
		<text x="26" y="92" class="box-copy">Typing text</text>
		<text x="26" y="132" class="box-copy">Insert Element</text>
		<text x="26" y="172" class="box-copy">Layouts</text>
		<text x="26" y="212" class="box-copy">Move or delete</text>
		<text x="26" y="252" class="box-copy">Preview quiz check</text>
		<text x="26" y="292" class="box-copy">Save</text>
	</g>
	<path class="arrow" d="M310 360 H390" />
	<g transform="translate(410 250)">
		<rect x="0" y="0" width="290" height="220" rx="18" fill="#eef6fc" stroke="#8bbfe5" stroke-width="3" />
		<text x="28" y="55" class="box-title">src/main.js</text>
		<text x="28" y="90" class="box-copy">handleClick()</text>
		<text x="28" y="125" class="box-copy">handleInput()</text>
		<text x="28" y="160" class="box-copy">savePage()</text>
		<text x="28" y="195" class="box-copy">render()</text>
	</g>
	<path class="arrow" d="M700 300 H780" />
	<path class="arrow" d="M700 360 H780" />
	<path class="arrow" d="M700 420 H780" />
	<g transform="translate(800 150)">
		<rect x="0" y="0" width="315" height="120" rx="14" fill="#ffffff" stroke="#cfd8e3" stroke-width="2" />
		<text x="24" y="48" class="box-title">insertion definitions</text>
		<text x="24" y="80" class="box-copy">Create new block or layout JSON.</text>
	</g>
	<g transform="translate(800 310)">
		<rect x="0" y="0" width="315" height="120" rx="14" fill="#ffffff" stroke="#cfd8e3" stroke-width="2" />
		<text x="24" y="48" class="box-title">editor-actions.js</text>
		<text x="24" y="80" class="box-copy">Update fields, order, delete, quiz.</text>
	</g>
	<g transform="translate(800 470)">
		<rect x="0" y="0" width="315" height="120" rx="14" fill="#ffffff" stroke="#cfd8e3" stroke-width="2" />
		<text x="24" y="48" class="box-title">state and toast</text>
		<text x="24" y="80" class="box-copy">Save draft and show feedback.</text>
	</g>
	<path class="arrow" d="M960 270 V300" />
	<path class="arrow" d="M960 430 V460" />
	<path class="arrow" d="M800 535 C650 630 470 620 455 485" />
	<path class="arrow" d="M805 215 C645 145 470 165 455 235" />
	<g transform="translate(440 575)">
		<rect x="0" y="0" width="320" height="82" rx="14" fill="#fff8ed" stroke="#e5bd7b" stroke-width="3" />
		<text x="24" y="36" class="box-title">pageState changes</text>
		<text x="24" y="63" class="box-copy">Then renderShell redraws the screen.</text>
	</g>
	<path class="arrow" d="M610 575 C570 520 570 500 600 470" />
</svg>
